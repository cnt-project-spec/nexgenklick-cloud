<div class="container my-5">

  <!-- PROFILE HEADER -->
  <div class="card shadow-lg border-0 mb-4">
    <div class="card-body d-flex align-items-center p-4">

      <i class="bi bi-person-circle"></i>

      <div>
        <h2 class="font-weight-bold mb-1">{{ profile.user.full_name }}</h2>
        <p class="text-muted mb-1"><i class="zmdi zmdi-email mr-1"></i> {{ profile.user.email }}</p>
        <!-- <p class="text-muted mb-0"><i class="zmdi zmdi-pin mr-1"></i> {{ profile.student.Program }}</p> -->
        <!-- <p class="text-muted mb-0"><i class="zmdi zmdi-pin mr-1"></i> {{ profile.student.Institution }}</p> -->
      </div>

      <div class="ml-auto">
        <button class="btn btn-primary btn-lg px-4 shadow-sm">
          Edit Profile
        </button>
      </div>

    </div>
  </div>

  <!-- APPLICATIONS SECTION -->
  <div class="card shadow-lg border-0">
    <div class="card-header bg-white py-3">
      <h4 class="mb-0 font-weight-bold">
        <i class="zmdi zmdi-file-text mr-2 text-primary"></i>
        Applied Applications
      </h4>
    </div>

    <div class="card-body p-0">
      <table class="table table-hover table-striped mb-0">
        <thead class="thead-dark">
          <tr>
            <th>#</th>
            <th>Job Title</th>
            <th>Company</th>
            <th></th>
          </tr>
        </thead>

        <tbody>
            
          <tr *ngFor="let app of intern; index as i">
            <td>{{ i + 1 }}</td>
            <td class="font-weight-bold">{{ app.Title }}</td>
            <td>{{ app.Company?.Name }}</td>
           <td>
              <button class="btn btn-outline-primary btn-sm">View</button>
            </td>
          </tr>


        </tbody>
      </table>
    </div>
  </div>

</div>
